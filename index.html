<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Max Ernst Huisman — AI</title>
  <meta name="description" content="Talk to Max's AI — OTIC Engineer & AI Builder at La Salle Barcelona" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --blue: #3b82f6;
      --blue-dark: #1d4ed8;
      --cyan: #06b6d4;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --subtle: #475569;
    }

    html, body {
      height: 100%;
      height: 100dvh;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ─── HEADER ─── */
    .header {
      padding: 14px 18px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      color: white;
      flex-shrink: 0;
      letter-spacing: -0.5px;
    }

    .header-info { flex: 1; min-width: 0; }

    .header-name {
      font-size: 15px;
      font-weight: 700;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-sub {
      font-size: 11px;
      color: #60a5fa;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .online-dot {
      width: 7px;
      height: 7px;
      background: #22c55e;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .header-links {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .header-link {
      font-size: 11px;
      color: var(--subtle);
      text-decoration: none;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .header-link:hover {
      color: #60a5fa;
      border-color: var(--blue);
    }

    /* ─── CHAT AREA ─── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 3px; }
    .chat-area::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }

    /* Intro */
    .intro {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
    }

    .intro-emoji { font-size: 28px; margin-bottom: 8px; }

    .intro h2 {
      font-size: 16px;
      font-weight: 700;
      color: white;
      margin-bottom: 6px;
    }

    .intro p {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Suggestion chips */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: #93c5fd;
      padding: 7px 13px;
      border-radius: 20px;
      font-size: 12.5px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .chip:hover {
      background: #1e3a5f;
      border-color: var(--blue);
    }

    /* Messages */
    .msg-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      max-width: 88%;
    }

    .msg-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 13.5px;
      line-height: 1.6;
    }

    .msg-row.ai .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 5px;
    }

    .msg-row.user .bubble {
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      color: white;
      border-bottom-right-radius: 5px;
    }

    /* Typing */
    .typing-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .typing-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #60a5fa;
      border-radius: 50%;
      animation: bounce 1.3s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ─── INPUT ─── */
    .input-area {
      padding: 10px 14px 14px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 11px 16px;
      color: var(--text);
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.45;
      max-height: 110px;
      min-height: 44px;
      transition: border-color 0.15s;
      overflow-y: auto;
    }

    textarea::placeholder { color: var(--subtle); }
    textarea:focus { border-color: var(--blue); }

    .send-btn {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }

    .send-btn:hover { opacity: 0.85; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .send-btn svg { width: 19px; height: 19px; fill: white; }

    .footer {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding-top: 8px;
    }

    .footer a {
      font-size: 11px;
      color: var(--subtle);
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer a:hover { color: #60a5fa; }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="avatar">MH</div>
  <div class="header-info">
    <div class="header-name">Max Ernst Huisman</div>
    <div class="header-sub">
      <span class="online-dot"></span>
      AI Assistant · OTIC Engineer @ La Salle
    </div>
  </div>
  <div class="header-links">
    <a class="header-link" href="https://linkedin.com/in/maxernst-huisman" target="_blank">LinkedIn</a>
    <a class="header-link" href="https://github.com/loplop-h" target="_blank">GitHub</a>
  </div>
</header>

<!-- CHAT -->
<div class="chat-area" id="chatArea">

  <div class="intro">
    <div class="intro-emoji">👋</div>
    <h2>Talk to Max's AI</h2>
    <p>Ask me anything — projects, skills, what he's looking for at MWC. I'm his AI, running 24/7.</p>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="chip" onclick="useSuggestion(this)">Who is Max?</button>
    <button class="chip" onclick="useSuggestion(this)">What projects does he have?</button>
    <button class="chip" onclick="useSuggestion(this)">What's he looking for at MWC?</button>
    <button class="chip" onclick="useSuggestion(this)">How can I contact him?</button>
  </div>

</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-row">
    <textarea
      id="input"
      placeholder="Ask me anything about Max..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="resize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="footer">
    <a href="mailto:maxhuismangtrz@gmail.com">maxhuismangtrz@gmail.com</a>
    <a href="tel:+34666459920">+34 666 459 920</a>
  </div>
</div>

<script>
  const history = [];

  function resize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 110) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  }

  function useSuggestion(btn) {
    document.getElementById('suggestions').remove();
    submit(btn.textContent);
  }

  function send() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';
    const sugg = document.getElementById('suggestions');
    if (sugg) sugg.remove();
    submit(text);
  }

  function submit(text) {
    addMsg('user', text);
    history.push({ role: 'user', content: text });
    fetchAI();
  }

  function addMsg(role, text) {
    const area = document.getElementById('chatArea');
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const safeText = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');

    if (role === 'ai') {
      row.innerHTML = `
        <div class="msg-avatar">MH</div>
        <div class="bubble">${safeText}</div>`;
    } else {
      row.innerHTML = `<div class="bubble">${safeText}</div>`;
    }

    area.appendChild(row);
    area.scrollTop = area.scrollHeight;
    return row;
  }

  function showTyping() {
    const area = document.getElementById('chatArea');
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.id = 'typing';
    row.innerHTML = `
      <div class="msg-avatar">MH</div>
      <div class="typing-bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>`;
    area.appendChild(row);
    area.scrollTop = area.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  async function fetchAI() {
    const btn = document.getElementById('sendBtn');
    const input = document.getElementById('input');
    btn.disabled = true;
    input.disabled = true;
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      const reply = data.content || 'Something went wrong. Contact Max at maxhuismangtrz@gmail.com';
      hideTyping();
      addMsg('ai', reply);
      history.push({ role: 'assistant', content: reply });
    } catch {
      hideTyping();
      addMsg('ai', 'Connection error. You can reach Max directly at maxhuismangtrz@gmail.com or +34 666 459 920.');
    } finally {
      btn.disabled = false;
      input.disabled = false;
      input.focus();
    }
  }
</script>

</body>
</html>
